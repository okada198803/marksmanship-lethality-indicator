<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaLI ver45 - Tactical Eval</title>
    <style>
        :root { 
            --primary: #ffcc00; --bg: #0a0a0a; --panel: #1a1a1a; 
            --accent: #007aff; --danger: #ff3b30; --success: #32d74b; 
            --text-dim: #888888; --input-bg: #f5f5f5; --input-text: #1a1a1a;
        }
        body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: var(--bg); color: #eeeeee; margin: 0; padding: 10px; padding-bottom: 30px; }
        .app-header { text-align: center; padding: 15px 0; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .app-title-main { font-size: 1.2rem; font-weight: 900; color: var(--primary); letter-spacing: 2px; margin: 0; }
        .card { background: var(--panel); border-radius: 8px; padding: 18px; margin-bottom: 15px; border: 1px solid #333; }
        h2 { font-size: 0.85rem; margin: 0 0 15px 0; color: var(--primary); border-left: 3px solid var(--primary); padding-left: 10px; text-transform: uppercase; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; display: block; font-weight: bold; }
        input[type="number"], input[type="text"] { width: 92%; background: var(--input-bg); border: none; color: var(--input-text); padding: 12px; border-radius: 4px; font-size: 1rem; font-weight: bold; }
        #timer-val { font-size: 5rem; font-weight: 800; text-align: center; color: var(--success); margin: 10px 0; font-family: monospace; }
        .sens-area { background: #000; padding: 15px; border-radius: 4px; border: 1px solid #333; margin-bottom: 15px; }
        #viz { width: 100%; height: 60px; display: block; }
        .btn-main { background: var(--primary); color: #000; width: 100%; padding: 25px; border-radius: 4px; font-weight: 900; font-size: 1.5rem; cursor: pointer; border: none; }
        .upload-btn { background: var(--accent); color: #fff; padding: 12px; width: 100%; border: none; font-weight: bold; border-radius: 4px; margin-bottom: 8px; cursor: pointer; }
        .canvas-container { width: 100%; background: #000; margin-bottom: 10px; border: 1px solid #444; border-radius: 4px; overflow: hidden; }
        canvas.shot-canvas { width: 100%; height: auto; display: block; }
        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #2c2c2e; font-size: 0.85rem; }
        .grade-badge { width: 24px; height: 24px; display: inline-flex; justify-content: center; align-items: center; border-radius: 50%; font-weight: 900; margin-left: 8px; font-size: 0.75rem; }
        .grade-A { background: var(--success); color: #000; }
        .grade-B { background: var(--primary); color: #000; }
        .grade-C { background: #ff9500; color: #000; }
        .grade-D { background: var(--danger); color: #fff; }
        .val-main { font-family: monospace; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<header class="app-header">
    <h1 class="app-title-main">MaLI ver45 - Tactical Eval</h1>
</header>

<div class="card">
    <h2>1. Scenario Config</h2>
    <div class="config-grid">
        <div style="grid-column: span 2;"><label>射手 ID</label><input type="text" id="cfg-shooter" value="OPERATOR-01"></div>
        <div style="grid-column: span 2;">
            <label>射距離 (m) ※複数なら / で区切る (例: 10 / 25)</label>
            <input type="text" id="cfg-range" value="10" oninput="autoConfigTargets(this.value)">
        </div>
        <div><label>的の数</label><input type="number" id="cfg-target-count" value="1" readonly></div>
        <div><label>予定発射数 (合計)</label><input type="number" id="cfg-total-shots" value="5"></div>
        <div><label>標的高さ (cm)</label><input type="number" id="cfg-target-height" value="90"></div>
        <div><label>目標散布界 (cm)</label><input type="number" id="cfg-target-grouping" value="15.0"></div>
        <div><label>目標初弾 (s)</label><input type="number" id="cfg-target-first" value="1.5" step="0.1"></div>
        <div><label>目標間隔 (s)</label><input type="number" id="cfg-target-split" value="0.5" step="0.1"></div>
        <div><label>目標リロード (s)</label><input type="number" id="cfg-target-reload" value="3.5" step="0.1"></div>
        <div><label>リロード弾数</label><input type="number" id="cfg-reload-at" value="0"></div>
    </div>
</div>

<div class="card">
    <h2>2. Timer</h2>
    <div class="sens-area">
        <label>閾値: <span id="sens-val">0.85</span></label>
        <input type="range" id="mic-sens" min="0.10" max="0.99" step="0.01" value="0.85" oninput="document.getElementById('sens-val').innerText=this.value" style="width:100%;">
        <canvas id="viz"></canvas>
    </div>
    <div id="timer-val">0.00</div>
    <button id="startBtn" class="btn-main">START</button>
</div>

<div id="acquisition-area" style="display:none;" class="card">
    <h2>3. Target Analysis</h2>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">写真を一括アップロード</button>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="processMultipleImages(this)">
    <div id="canvas-list"></div>
</div>

<div id="assessment-area" style="display:none;"></div>

<script>
    let audioCtx, analyser, dataArray, isRunning = false, startTime, shotTimes = [];
    let cumulativeHits = 0, individualGroupings = [], finalStats = {};
    const vizCanvas = document.getElementById('viz'), vizCtx = vizCanvas.getContext('2d');

    function autoConfigTargets(val) {
        const ranges = val.split('/').map(r => r.trim()).filter(r => r !== "");
        document.getElementById('cfg-target-count').value = ranges.length || 1;
        if (ranges.length > 0) {
            const maxRange = Math.max(...ranges.map(Number));
            document.getElementById('cfg-target-grouping').value = (maxRange * 1.2).toFixed(1);
        }
    }

    async function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256; source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount); renderViz();
    }

    function renderViz() {
        requestAnimationFrame(renderViz); if (!analyser) return; 
        analyser.getByteTimeDomainData(dataArray);
        vizCtx.clearRect(0, 0, vizCanvas.width, vizCanvas.height);
        vizCtx.lineWidth = 2; vizCtx.strokeStyle = "#ffcc00"; vizCtx.beginPath();
        let slice = vizCanvas.width / dataArray.length, x = 0;
        for (let i = 0; i < dataArray.length; i++) {
            let v = dataArray[i] / 128.0, y = v * vizCanvas.height / 2;
            if (i === 0) vizCtx.moveTo(x, y); else vizCtx.lineTo(x, y); x += slice;
        }
        vizCtx.stroke();
        if (isRunning) checkShot();
    }

    function checkShot() {
        const now = (performance.now() - startTime) / 1000;
        if (now < 0.2) return; 
        let max = 0; for (let i = 0; i < dataArray.length; i++) { let v = Math.abs(dataArray[i] - 128) / 128; if (v > max) max = v; }
        const th = parseFloat(document.getElementById('mic-sens').value);
        const reloadAt = parseInt(document.getElementById('cfg-reload-at').value);
        let deadTime = (reloadAt > 0 && shotTimes.length === reloadAt) ? 1.2 : 0.08; 

        if (max > th && (shotTimes.length === 0 || (now - shotTimes[shotTimes.length-1]) > deadTime)) {
            shotTimes.push(now);
            document.getElementById('timer-val').innerText = now.toFixed(2);
            if (shotTimes.length >= parseInt(document.getElementById('cfg-total-shots').value)) finishEngagement();
        }
    }

    function finishEngagement() {
        isRunning = false; document.getElementById('startBtn').innerText = "DONE";
        document.getElementById('acquisition-area').style.display = 'block';
    }

    async function processMultipleImages(input) {
        const files = Array.from(input.files);
        const container = document.getElementById('canvas-list');
        container.innerHTML = ""; cumulativeHits = 0; individualGroupings = [];
        for (let i = 0; i < files.length; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = "canvas-container";
            const cvs = document.createElement('canvas'); cvs.className = "shot-canvas";
            wrapper.appendChild(cvs); container.appendChild(wrapper);
            await new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    const ctx = cvs.getContext('2d');
                    const MAX_W = 1000;
                    let drawW = img.width, drawH = img.height;
                    if (drawW > MAX_W) { drawH *= MAX_W/drawW; drawW = MAX_W; }
                    cvs.width = drawW; cvs.height = drawH;
                    ctx.drawImage(img, 0, 0, drawW, drawH);
                    const res = analyzeBlueMarks(ctx, drawW, drawH, i + 1);
                    cumulativeHits += res.count; individualGroupings.push(res.grouping);
                    resolve();
                };
                img.src = URL.createObjectURL(files[i]);
            });
        }
        generateAssessment();
    }

    function analyzeBlueMarks(ctx, w, h, targetNum) {
        const imageData = ctx.getImageData(0, 0, w, h);
        const data = imageData.data;
        let pts = [];
        for (let i = 0; i < data.length; i += 16) {
            const r = data[i], g = data[i+1], b = data[i+2];
            if (b > 110 && b > r * 1.5 && b > g * 1.2) pts.push({ x: (i / 4) % w, y: Math.floor((i / 4) / w) });
        }
        let clusters = [];
        pts.forEach(p => {
            let found = false;
            for (let c of clusters) {
                if (Math.sqrt((c.x - p.x)**2 + (c.y - p.y)**2) < 20) {
                    c.x = (c.x + p.x) / 2; c.y = (c.y + p.y) / 2; c.size++; found = true; break;
                }
            }
            if (!found) clusters.push({ x: p.x, y: p.y, size: 1 });
        });
        const avgSize = 90;
        let finalShots = [];
        clusters.forEach(c => {
            if (c.size > 8) {
                let count = Math.max(1, Math.round(c.size / avgSize));
                for(let k=0; k<count; k++) finalShots.push({ x: c.x + (k*3), y: c.y + (k*3) });
            }
        });
        ctx.strokeStyle = '#007aff'; ctx.lineWidth = 5;
        finalShots.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, 25, 0, Math.PI * 2); ctx.stroke(); });
        const cmPerPx = parseFloat(document.getElementById('cfg-target-height').value) / h;
        let maxD = 0;
        for (let i = 0; i < finalShots.length; i++) 
            for (let j = i + 1; j < finalShots.length; j++) 
                maxD = Math.max(maxD, Math.sqrt((finalShots[i].x-finalShots[j].x)**2 + (finalShots[i].y-finalShots[j].y)**2));
        return { count: finalShots.length, grouping: maxD * cmPerPx };
    }

    function getGrade(actual, goal, isLowerBetter = true) {
        if (actual === 0 && !isLowerBetter) return 'D';
        const ratio = actual / goal;
        if (isLowerBetter) {
            if (ratio <= 0.85) return 'A';
            if (ratio <= 1.15) return 'B'; // 目標値付近はB
            if (ratio <= 1.40) return 'C';
            return 'D';
        } else {
            if (ratio >= 1.10) return 'A';
            if (ratio >= 0.90) return 'B';
            if (ratio >= 0.70) return 'C';
            return 'D';
        }
    }

    function generateAssessment() {
        const area = document.getElementById('assessment-area');
        area.innerHTML = ""; area.style.display = 'block';
        
        const cfg = {
            shots: parseInt(document.getElementById('cfg-total-shots').value),
            group: parseFloat(document.getElementById('cfg-target-grouping').value),
            first: parseFloat(document.getElementById('cfg-target-first').value),
            split: parseFloat(document.getElementById('cfg-target-split').value),
            reload: parseFloat(document.getElementById('cfg-target-reload').value),
            reloadAt: parseInt(document.getElementById('cfg-reload-at').value)
        };

        const firstShot = shotTimes[0] || 0;
        let splits = [];
        for(let i=1; i<shotTimes.length; i++) {
            if(cfg.reloadAt > 0 && i === cfg.reloadAt) continue; 
            splits.push(shotTimes[i] - shotTimes[i-1]);
        }
        const avgSplit = splits.length > 0 ? splits.reduce((a,b)=>a+b,0)/splits.length : 0;
        const reloadTime = (cfg.reloadAt > 0 && shotTimes[cfg.reloadAt]) ? (shotTimes[cfg.reloadAt] - shotTimes[cfg.reloadAt-1]) : 0;
        const totalTime = shotTimes[shotTimes.length-1] || 0;
        const maxGrp = Math.max(...individualGroupings, 0);

        finalStats = {
            hits: { val: cumulativeHits, goal: cfg.shots, grade: getGrade(cumulativeHits, cfg.shots, false) },
            group: { val: maxGrp, goal: cfg.group, grade: getGrade(maxGrp, cfg.group, true) },
            first: { val: firstShot, goal: cfg.first, grade: getGrade(firstShot, cfg.first, true) },
            split: { val: avgSplit, goal: cfg.split, grade: getGrade(avgSplit, cfg.split, true) },
            reload: { val: reloadTime, goal: cfg.reload, grade: cfg.reloadAt > 0 ? getGrade(reloadTime, cfg.reload, true) : 'B' },
            exposure: { val: totalTime, goal: (cfg.first + cfg.split*(cfg.shots-1) + (cfg.reloadAt>0?cfg.reload:0)), grade: getGrade(totalTime, (cfg.first + cfg.split*(cfg.shots-1) + (cfg.reloadAt>0?cfg.reload:0)), true) }
        };

        area.innerHTML = `
            <div class="card">
                <h2>4. Comprehensive Analysis</h2>
                <div style="display:flex; justify-content:center; background:#000; padding:10px; border-radius:8px;">
                    <canvas id="radarCanvas" width="400" height="400" style="width:280px; height:280px;"></canvas>
                </div>
                <div style="margin-top:20px;">
                    ${createDetailRow("合計命中数", finalStats.hits, "発")}
                    ${createDetailRow("最大散布界", finalStats.group, "cm")}
                    ${createDetailRow("初弾速度", finalStats.first, "s")}
                    ${createDetailRow("平均間隔", finalStats.split, "s")}
                    ${cfg.reloadAt > 0 ? createDetailRow("リロード", finalStats.reload, "s") : ""}
                    ${createDetailRow("総暴露時間", finalStats.exposure, "s")}
                </div>
                <button onclick="exportFullCSV()" style="width:100%; margin-top:20px; padding:18px; background:var(--primary); color:#000; font-weight:bold; border:none; border-radius:4px; font-size:1rem;">CSV詳細レポート出力</button>
            </div>
        `;
        setTimeout(drawRadar, 100);
    }

    function createDetailRow(lbl, stat, unit) {
        return `
            <div class="score-row">
                <span>${lbl}</span>
                <div style="display:flex; align-items:center;">
                    <span class="val-main">${stat.val.toFixed(2)}${unit}</span>
                    <span class="grade-badge grade-${stat.grade}">${stat.grade}</span>
                </div>
            </div>`;
    }

    function drawRadar() {
        const cvs = document.getElementById('radarCanvas'); if(!cvs) return;
        const ctx = cvs.getContext('2d'), r = 130, cx = 200, cy = 200;
        ctx.clearRect(0,0,400,400);
        
        // グリッドとランク表示
        const ranks = ["D", "C", "B", "A"];
        ctx.textAlign = "center"; ctx.font = "10px monospace";
        for(let j=1; j<=4; j++) {
            ctx.beginPath(); ctx.strokeStyle = (j===3) ? "var(--primary)" : "#333";
            ctx.lineWidth = (j===3) ? 2 : 1;
            for(let i=0; i<4; i++) {
                const a = (Math.PI/2)*i - Math.PI/2;
                ctx.lineTo(cx+(r*j/4)*Math.cos(a), cy+(r*j/4)*Math.sin(a));
            }
            ctx.closePath(); ctx.stroke();
            ctx.fillStyle = "#666"; ctx.fillText(ranks[j-1], cx, cy - (r*j/4) + 10);
        }

        const labels = ["精度", "速度", "制御", "暴露"];
        const scores = [
            mapToRadar(finalStats.hits.grade), 
            mapToRadar(finalStats.first.grade), 
            mapToRadar(finalStats.reload.grade), 
            mapToRadar(finalStats.exposure.grade)
        ];

        ctx.fillStyle = "rgba(255, 204, 0, 0.4)"; ctx.strokeStyle = "var(--primary)"; ctx.lineWidth = 3;
        ctx.beginPath();
        scores.forEach((s, i) => {
            const a = (Math.PI/2)*i - Math.PI/2;
            ctx.lineTo(cx + r * s * Math.cos(a), cy + r * s * Math.sin(a));
            ctx.fillStyle = "#fff"; ctx.font = "bold 14px sans-serif";
            ctx.fillText(labels[i], cx + (r+35)*Math.cos(a), cy + (r+35)*Math.sin(a) + 5);
        });
        ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    function mapToRadar(grade) {
        return { 'A': 1.0, 'B': 0.75, 'C': 0.5, 'D': 0.25 }[grade] || 0.25;
    }

    function exportFullCSV() {
        const shooter = document.getElementById('cfg-shooter').value;
        const rangeArr = document.getElementById('cfg-range').value.split('/').map(s => s.trim());
        const now = new Date().toLocaleString('ja-JP');

        let headers = ["Timestamp", "ShooterID", "Total_Hits", "Hits_Grade", "Max_Grouping_cm", "Grouping_Grade", "FirstShot_s", "FirstShot_Grade", "AvgSplit_s", "Split_Grade", "Reload_s", "Reload_Grade", "TotalExposure_s", "Exposure_Grade"];
        rangeArr.forEach((r, i) => { headers.push(`Range_T${i+1}_m`, `Grouping_T${i+1}_cm`); });
        for(let i=1; i<=shotTimes.length; i++) headers.push(`Shot${i}_Time`);

        let row = [
            now, shooter, 
            finalStats.hits.val, finalStats.hits.grade,
            finalStats.group.val.toFixed(2), finalStats.group.grade,
            finalStats.first.val.toFixed(2), finalStats.first.grade,
            finalStats.split.val.toFixed(2), finalStats.split.grade,
            finalStats.reload.val.toFixed(2), finalStats.reload.grade,
            finalStats.exposure.val.toFixed(2), finalStats.exposure.grade
        ];
        rangeArr.forEach((r, i) => { row.push(r, (individualGroupings[i]||0).toFixed(2)); });
        shotTimes.forEach(t => row.push(t.toFixed(2)));

        let csvContent = "\uFEFF" + headers.join(",") + "\n" + row.join(",");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `MaLI_TacticalReport_${shooter}.csv`;
        link.click();
    }

    document.getElementById('startBtn').onclick = async () => {
        await initAudio(); shotTimes = []; document.getElementById('timer-val').innerText = "STANDBY";
        setTimeout(() => {
            const osc = audioCtx.createOscillator(); osc.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            startTime = performance.now(); isRunning = true;
            document.getElementById('timer-val').innerText = "0.00";
        }, 2000 + Math.random() * 2000);
    };
</script>
</body>
</html>
